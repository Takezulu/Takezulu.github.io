<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>Update / 업데이트</title>
<style>
  :root{
    --bg:#0d0f14; --panel:#161a22; --line:#262c38;
    --text:#eef1f6; --muted:#9aa4b5; --gold:#e7c162; --gold2:#caa23f;
    --google:#2c333f; --one:#c8102e;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:radial-gradient(1200px 600px at 50% -10%, #1b2130 0%, var(--bg) 60%);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR","Noto Sans",sans-serif;
    min-height:100vh; min-height:100dvh;
    display:flex; align-items:center; justify-content:center;
    padding:24px 20px calc(24px + env(safe-area-inset-bottom));
    line-height:1.55;
  }
  .card{
    width:100%; max-width:420px; text-align:center;
    background:linear-gradient(180deg,var(--panel),#12151c);
    border:1px solid var(--line); border-radius:20px;
    padding:34px 24px 30px; box-shadow:0 20px 60px rgba(0,0,0,.5);
  }
  .crest{
    width:78px;height:78px;margin:0 auto 18px;border-radius:18px;
    display:block;object-fit:cover;
    border:1px solid var(--line);
    box-shadow:0 8px 24px rgba(0,0,0,.45);
  }
  h1{margin:0 0 10px;font-size:22px;font-weight:800;letter-spacing:.2px}
  p.desc{margin:0 auto 26px;font-size:15px;color:var(--muted);max-width:340px;white-space:pre-line}
  .btns{display:flex;flex-direction:column;gap:12px}
  a.btn{
    display:flex;align-items:center;justify-content:center;gap:10px;
    text-decoration:none;color:#fff;font-weight:700;font-size:16px;
    padding:16px 18px;border-radius:14px;border:1px solid #ffffff14;
    transition:transform .05s ease, filter .15s ease;
  }
  a.btn:active{transform:scale(.985)}
  a.google{background:linear-gradient(180deg,#333c4b,#2a303b)}
  a.one{background:linear-gradient(180deg,#d81a38,#b30f28)}
  a.btn .ic{font-size:18px}
  a.btn small{display:block;font-weight:500;font-size:11px;opacity:.72;margin-top:1px}
  .hint{margin-top:22px;font-size:12.5px;color:var(--muted)}
  .langs{margin-top:24px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
  .langs button{
    background:transparent;border:1px solid var(--line);color:var(--muted);
    font-size:12px;padding:6px 12px;border-radius:999px;cursor:pointer;
  }
  .langs button.on{border-color:var(--gold);color:var(--gold)}
  .foot{margin-top:20px;font-size:11px;color:#5b6577}
</style>
</head>
