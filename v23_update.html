<style>
  :root {
    --bg: #f2f2ef;
    --surface: #ffffff;
    --border: #dcdad2;
    --ink: #23252e;
    --muted: #6f6d78;
    --accent: #9c7118;
    --accent-soft: rgba(156, 113, 24, 0.12);
    --num: #b8860b;
    --shadow: 0 1px 3px rgba(20, 20, 30, 0.08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #12141c;
      --surface: #1a1d28;
      --border: #2b2f3e;
      --ink: #e6e4dd;
      --muted: #9a97a8;
      --accent: #d9a54a;
      --accent-soft: rgba(217, 165, 74, 0.12);
      --num: #d9a54a;
      --shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
    }
  }
  :root[data-theme="dark"] {
    --bg: #12141c;
    --surface: #1a1d28;
    --border: #2b2f3e;
    --ink: #e6e4dd;
    --muted: #9a97a8;
    --accent: #d9a54a;
    --accent-soft: rgba(217, 165, 74, 0.12);
    --num: #d9a54a;
    --shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
  }
  :root[data-theme="light"] {
    --bg: #f2f2ef;
    --surface: #ffffff;
    --border: #dcdad2;
    --ink: #23252e;
    --muted: #6f6d78;
    --accent: #9c7118;
    --accent-soft: rgba(156, 113, 24, 0.12);
    --num: #b8860b;
    --shadow: 0 1px 3px rgba(20, 20, 30, 0.08);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
      "Noto Sans KR", "Noto Sans TC", "Noto Sans Thai", "Malgun Gothic", "PingFang TC",
      Helvetica, Arial, sans-serif;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 780px; margin: 0 auto; padding: 0 20px 64px; }

  header.top {
    display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between;
    gap: 12px; padding: 20px 0 16px;
    border-bottom: 1px solid var(--border);
  }
  .brand { display: flex; align-items: baseline; gap: 10px; }
  .brand .game {
    font-weight: 800; font-size: 1.02rem; letter-spacing: 0.02em;
  }
  .brand .studio {
    font-size: 0.78rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase;
  }
  nav.langs { display: flex; flex-wrap: wrap; gap: 6px; }
  nav.langs button {
    appearance: none; border: 1px solid var(--border); background: transparent;
    color: var(--muted); font: inherit; font-size: 0.82rem; line-height: 1;
    padding: 7px 12px; border-radius: 999px; cursor: pointer;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }
  nav.langs button:hover { color: var(--ink); border-color: var(--accent); }
  nav.langs button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  nav.langs button.on {
    background: var(--accent-soft); border-color: var(--accent); color: var(--accent);
    font-weight: 700;
  }

  .hero { padding: 44px 0 8px; }
  .hero .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 0.78rem; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--accent); font-weight: 700;
  }
  .hero .eyebrow::before, .hero .eyebrow::after {
    content: "◆"; font-size: 0.6em; opacity: 0.8;
  }
  .hero h1 {
    margin: 10px 0 0; font-size: clamp(1.7rem, 4.5vw, 2.4rem);
    line-height: 1.25; font-weight: 800; letter-spacing: -0.01em; text-wrap: balance;
  }
  .hero .rule {
    width: 64px; height: 3px; background: var(--accent); margin-top: 20px; border-radius: 2px;
  }

  .greet { padding: 22px 0 10px; color: var(--ink); }
  .greet p { margin: 0 0 12px; max-width: 62ch; }
  .greet p:last-child { margin-bottom: 0; }

  section.card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    box-shadow: var(--shadow);
    padding: 26px 28px; margin-top: 22px;
  }
  section.card .head {
    display: flex; align-items: baseline; gap: 14px; margin-bottom: 6px;
  }
  section.card .no {
    font-variant-numeric: tabular-nums;
    color: var(--num); font-weight: 800; font-size: 1.35rem; line-height: 1;
    min-width: 1.4em;
  }
  section.card h2 {
    margin: 0; font-size: 1.18rem; font-weight: 800; letter-spacing: -0.005em;
  }
  section.card p.solo { margin: 6px 0 0; color: var(--ink); }
  ul.items { list-style: none; margin: 10px 0 0; padding: 0; }
  ul.items li {
    position: relative; padding-left: 20px; margin-bottom: 10px; max-width: 68ch;
  }
  ul.items li:last-child { margin-bottom: 0; }
  ul.items li::before {
    content: "◆"; position: absolute; left: 0; top: 0.45em;
    font-size: 0.5em; color: var(--accent);
  }
  .shot { margin: 16px 0 6px; }
  .shot img {
    display: block; width: 100%; max-width: 100%; height: auto;
    border-radius: 10px; border: 1px solid var(--border);
  }

  footer.end {
    margin-top: 48px; padding-top: 20px; border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    color: var(--muted); font-size: 0.82rem;
  }
  footer.end .mark { color: var(--accent); letter-spacing: 0.3em; }

  @media (max-width: 560px) {
    section.card { padding: 20px 18px; }
    header.top { flex-direction: column; align-items: flex-start; }
  }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>

const ORDER = ["ko", "en", "zh-TW", "th", "vi"];

function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text != null) e.textContent = text;
  return e;
}

function render(code) {
  const t = I18N[code];
  document.documentElement.lang = code;
  document.getElementById("gameTitle").textContent = t.game;
  document.getElementById("eyebrow").textContent = t.eyebrow;
  document.getElementById("title").textContent = t.title;
  document.getElementById("footerNote").textContent = t.footer;

  const greet = document.getElementById("greet");
  greet.replaceChildren(...t.greet.map(p => el("p", null, p)));

  const root = document.getElementById("sections");
  root.replaceChildren();
  for (const s of t.sections) {
    const card = el("section", "card");
    const head = el("div", "head");
    head.append(el("span", "no", s.no), Object.assign(el("h2"), { textContent: s.title }));
    card.append(head);
    if (s.solo) {
      card.append(el("p", "solo", s.solo));
    } else {
      let ul = null;
      for (const item of s.items) {
        if (typeof item === "object" && item.img) {
          ul = null;
          const fig = el("div", "shot");
          const img = new Image();
          img.src = IMG[item.img];
          img.alt = t.imgAlt[item.img];
          img.loading = "lazy";
          fig.append(img);
          card.append(fig);
        } else {
          if (!ul) { ul = el("ul", "items"); card.append(ul); }
          ul.append(el("li", null, item));
        }
      }
    }
    root.append(card);
  }

  for (const b of document.querySelectorAll("nav.langs button")) {
    b.classList.toggle("on", b.dataset.code === code);
  }
}

const nav = document.getElementById("langNav");
for (const code of ORDER) {
  const b = el("button", null, I18N[code].name);
  b.dataset.code = code;
  b.addEventListener("click", () => render(code));
  nav.append(b);
}

function detect() {
  const prefs = navigator.languages || [navigator.language || "en"];
  for (const p of prefs) {
    const low = (p || "").toLowerCase();
    if (low.startsWith("ko")) return "ko";
    if (low.startsWith("zh")) return "zh-TW";
    if (low.startsWith("th")) return "th";
    if (low.startsWith("vi")) return "vi";
    if (low.startsWith("en")) return "en";
  }
  return "en";
}

render(detect());
